name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual re-run from GitHub Actions tab

# Required by the GitHub Pages deployment API
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel in-progress if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Tells GitHub this job deploys to the Pages environment (enables the URL output)
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /1789-website

      # next build with output:'export' writes to ./out
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - id: deploy
        uses: actions/deploy-pages@v4
